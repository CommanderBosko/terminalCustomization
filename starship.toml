# ~/.config/starship.toml

add_newline = false

# Disable the default prompt symbol
[character]
success_symbol = "[➜](bold green)"
error_symbol = "[✗](bold red)"

# Customize the directory module
[directory]
truncation_length = 3
truncate_to_repo = false

# Add a custom format to the git_status module
[git_status]
conflicted = "🏳"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "??"
stashed = "[$](bold blue)"
modified = "!"
staged = "[+](green)"
deleted = "✘"

# Customize the python module
[python]
format = "via [${symbol}${pyenv_prefix}(${version} )]($style)"
symbol = "🐍 "
pyenv_prefix = "pyenv "

# Add node.js module
[nodejs]
format = "via [${symbol}${version}]($style)"
symbol = "⬢ "

# Custom command example
[custom.hello]
command = "echo 'Hello, Starship!'"
when = false
style = "bold yellow"
